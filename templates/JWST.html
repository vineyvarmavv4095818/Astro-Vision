<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='jwst.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <h1>
        <i class="fa-solid fa-crosshairs"></i>
        James Webb Gallery</h1>

<div class="gallery">

{% for item in images %}

    <div class="card">  

    <img src="{{ item.image }}">

    <h3>{{ item.title }}</h3>

    </div>

{% endfor %}

</div>

<br>

<p>
    Captured by NASA's James Web Space Telescope🔭
</p>
</body>
</html>
